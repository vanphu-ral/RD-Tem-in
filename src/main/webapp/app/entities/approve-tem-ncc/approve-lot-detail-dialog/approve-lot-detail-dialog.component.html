<h2 mat-dialog-title class="dialog-title">
  <span>Cập nhật thông tin vật tư</span>
  <span class="part-number-badge">Part Number: {{ data.partNumber }}</span>
  <button mat-icon-button class="close-btn" (click)="onClose()">
    <mat-icon>close</mat-icon>
  </button>
</h2>

<mat-dialog-content class="dialog-content">
  <p class="production-date">
    Danh sách vật tư ngày sản xuất: {{ data.manufacturingDate }}
  </p>

  <div class="table-scroll-wrapper">
    <table class="edit-table">
      <!-- ===== HEADER ROW ===== -->
      <thead>
        <tr class="header-row">
          <th *ngFor="let col of columns" [style.min-width.px]="col.minWidth">
            <div class="th-content">
              <span>{{ col.label }}</span>
              <mat-icon class="sort-icon">arrow_drop_down</mat-icon>
            </div>
          </th>
        </tr>

        <!-- ===== APPLY ROW (bulk fill) ===== -->
        <tr class="apply-row">
          <td *ngFor="let col of columns">
            <div class="apply-cell" *ngIf="col.editable; else emptyApply">
              <input
                class="apply-input"
                [(ngModel)]="bulkValues[col.key]"
                [placeholder]="''"
                (keydown.enter)="applyColumn(col.key)"
              />
              <button
                mat-icon-button
                class="apply-icon-btn"
                (click)="applyColumn(col.key)"
                matTooltip="Áp dụng cho cả cột"
              >
                <mat-icon>save</mat-icon>
              </button>
            </div>
            <ng-template #emptyApply>
              <div class="apply-cell-empty"></div>
            </ng-template>
          </td>
        </tr>
      </thead>

      <!-- ===== DATA ROWS ===== -->
      <tbody>
        <tr
          *ngFor="let row of rows; let i = index"
          class="data-row"
          [class.editing-row]="editingCell?.row === i"
        >
          <td
            *ngFor="let col of columns"
            class="data-cell"
            [class.editable-cell]="col.editable"
            [class.active-edit]="
              editingCell?.row === i && editingCell?.col === col.key
            "
            (dblclick)="col.editable && startEdit(i, col.key)"
          >
            <ng-container
              *ngIf="
                editingCell?.row === i && editingCell?.col === col.key;
                else displayMode
              "
            >
              <input
                #cellInput
                class="cell-input"
                [(ngModel)]="row[col.key]"
                (blur)="stopEdit()"
                (keydown.enter)="stopEdit()"
                (keydown.escape)="cancelEdit(i, col.key)"
                (keydown.tab)="moveEditNext(i, col.key, $any($event))"
              />
            </ng-container>
            <ng-template #displayMode>
              <span class="cell-value" [title]="row[col.key]">{{
                row[col.key]
              }}</span>
            </ng-template>
          </td>
        </tr>

        <tr *ngIf="rows.length === 0">
          <td [attr.colspan]="columns.length" class="no-data-cell">
            Không có dữ liệu
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</mat-dialog-content>

<mat-dialog-actions class="dialog-actions">
  <button mat-raised-button color="primary" (click)="onSave()">Lưu</button>
</mat-dialog-actions>
